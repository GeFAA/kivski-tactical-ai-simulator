# Production preset -- used for 24/7 cloud training. WR-fixes baked in,
# frequent checkpoints for HF Hub sync. Auto-detects GPU. Use via:
#   kivski-train --config configs/production.yaml
#
# Derived from configs/turbo.yaml. Key deltas vs turbo:
#   * league.exploit_fraction = 0.0  (no exploiters until WR > 0)
#   * league.random_fraction = 0.50  (mostly random opponents early)
#   * league.scripted_fraction = 0.30
#   * reward_shaping.defenders_elim_bonus = 3.0
#   * reward_shaping.plant_progress_per_second = 0.5
#   * training.num_envs = 48 (full cloud)
#   * training.total_episodes = 1_000_000 (run until manually stopped)
#   * training.checkpoint_every_episodes = 100 (more frequent HF Hub sync)

seed: 20260524

simulation:
  map: dustline
  team_size: 5
  max_rounds: 12
  side_switch_round: 6
  round_time_seconds: 90
  bomb_timer_seconds: 40
  plant_time_seconds: 3.0
  defuse_time_seconds: 5.0
  defuse_time_with_kit_seconds: 3.0
  buy_time_seconds: 15
  tick_rate_hz: 10
  max_ticks_per_round: 900
  starting_money: 800
  frame_skip: 6

economy:
  reward_round_win: 3250
  reward_round_loss_base: 1900
  reward_round_loss_increment: 500
  reward_round_loss_max: 3400
  reward_kill_rifle: 300
  reward_kill_pistol: 300
  reward_kill_smg: 600
  reward_kill_sniper: 100
  reward_bomb_plant: 300
  reward_bomb_defuse: 250
  reward_bomb_detonate: 150

combat:
  base_accuracy_standing: 0.78
  base_accuracy_moving: 0.32
  base_accuracy_crouched: 0.92
  reaction_time_min_ticks: 1
  reaction_time_max_ticks: 5
  los_check_step: 0.5
  cover_damage_multiplier: 0.55

agent:
  observation:
    teammate_slots: 4
    last_known_enemies: 5
    sound_event_slots: 6
    received_message_slots: 5
    history_length: 4
  action:
    move_intents: 9
    micro_actions: 6
    comm_actions: 9
    buy_options: 8

ml:
  algo: mappo
  # v0.6: bumped capacity for better RTX 4090 utilization (Option B in
  # the cloud-tuning playbook). CPU is the bottleneck with subproc envs,
  # so we shift more work into each PPO update without losing fps:
  #   hidden_size 256 -> 384   (~2x params, head_dim 96 still clean for 4 heads)
  #   minibatch_size 2048 -> 4096   (15 batches of 4096 == 61_440 transitions)
  #   ppo_epochs 4 -> 5   (25% more gradient passes per rollout)
  # Peak VRAM well under 4 GB on RTX 4090; CPU sim load unchanged.
  hidden_size: 384
  gru_layers: 1
  comm_attention_heads: 4
  comm_embedding_dim: 64
  gumbel_temperature: 1.0
  ppo_clip: 0.2
  ppo_epochs: 5
  minibatch_size: 4096
  learning_rate: 6.0e-4
  entropy_coef: 0.030
  value_coef: 0.5
  gae_lambda: 0.95
  gamma: 0.99
  max_grad_norm: 0.5

training:
  num_envs: 48
  rollout_steps: 256
  total_episodes: 1000000
  checkpoint_every_episodes: 100
  eval_every_episodes: 50
  curriculum:
    enabled: false
    stages: []

league:
  population_size: 4
  snapshot_every_episodes: 500
  # v0.6.1: fractions MUST sum to 1.0 -- league.py falls through to live
  # self-play when the cumulative threshold misses, so the previous
  # 0.0+0.5+0.3=0.8 hid 20% silent self-play vs the current main policy
  # and undermined the v0.5 WR-fix that intentionally kept exploit at 0.
  exploit_fraction: 0.0
  random_fraction: 0.60
  scripted_fraction: 0.40

reward_shaping:
  enabled: true
  decay_after_episodes: 12000
  damage_dealt_per_hp: 0.016
  damage_received_per_hp: -0.008
  survival_per_second: 0.002
  # v0.6.1: these fire EVERY inner-tick while bomb is planted/defusing
  # (engine design at env.py:1159, 1174). Frame-skip=6 + tick_rate=10 + a
  # ~40s planted phase = up to ~400 inner ticks, so the per-tick value
  # aggregates to (val * 400) per round per agent. We want this aggregate
  # to be ~1.0 (smaller than defenders_elim_bonus=3.0 and the engine's
  # plant/defuse outcome reward), so per-tick must be ~0.0025.
  successful_plant: 0.0025   # aggregate ~1.0 per planted round per attacker
  successful_defuse: 0.002   # aggregate ~0.8 per defused round per defender
  bomb_pickup: 0.10
  useful_trade: 0.40
  pointless_death: -0.50
  map_control_per_tile: 0.0020
  defenders_elim_bonus: 3.0
  plant_progress_per_second: 0.5

reward_curriculum:
  enabled: true
  stages:
    - { name: "killshoot", episodes: 1500,  features: ["kill", "survive", "damage_dealt", "damage_received"] }
    - { name: "objective", episodes: 5000,  features: ["kill", "survive", "damage_dealt", "damage_received", "bomb_plant", "bomb_defuse", "bomb_pickup", "useful_trade"] }
    - { name: "full",      episodes: -1,    features: ["all"] }

telemetry:
  backend: csv
  log_every_episodes: 5
  flush_every_seconds: 1

evaluation:
  baselines: [random, scripted_rush, scripted_hold, frozen_latest]
  scenarios:
    - { name: full_pistol,       team_size: 5, money_override: 800 }
    - { name: full_buy,          team_size: 5, money_override: 5000 }
    - { name: retake_2v3,        attackers: 3, defenders: 2, scenario: "post_plant" }
    - { name: save_round,        team_size: 5, money_override: 0 }
  matches_per_scenario: 10

server:
  host: "127.0.0.1"
  port: 8000
  tick_broadcast_hz: 20
  max_clients: 4
